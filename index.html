<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pocket Brownie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="/img/webim.png">
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <h1 class="brand">
            <span class="nav-icon" style="-webkit-mask-image: url('img/pocket.svg'); mask-image: url('img/pocket.svg'); width: 50px; height: 50px;">
            </span>Pocket Brownie</h1>
            <ul class="nav-links">
                <li class="active" onclick="switchTab('calender')">
                    <span class="nav-icon" style="-webkit-mask-image: url('img/calender.svg'); mask-image: url('img/calender.svg');">
                    </span>Calender</li>
                <li onclick="switchTab('todos')">
                    <span class="nav-icon" style="-webkit-mask-image: url('img/list-check.svg'); mask-image: url('img/list-check.svg');">
                    </span>To-Dos</li>
                <li onclick="switchTab('chores')">
                    <span class="nav-icon" style="-webkit-mask-image: url('img/chores.svg'); mask-image: url('img/chores.svg');">
                    </span>Chores</li>
                <li onclick="switchTab('habits')">
                    <span class="nav-icon" style="-webkit-mask-image: url('img/habits.svg'); mask-image: url('img/habits.svg');">
                    </span>Habits</li>
                <li onclick="switchTab('rewards')"><span class="nav-icon" style="-webkit-mask-image: url('img/reward.svg'); mask-image: url('img/reward.svg');">
                    </span>Rewards</li>
            </ul>
            <div id="quote-desktop" class="quote-display"></div>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <header class="top-bar">
                <span class="head-icon"></span>
                <h2 id="current-tab-title">Calender</h2>
                <div class="header-actions">
                    <div class="points-display">
                        <span>Points: </span>
                        <span id="brownie-points">0</span>
                    </div>
                    <button class="btn-primary" onclick="openModal()">+</button>
                </div>
            </header>

            <!-- Views -->
            <section id="view-calender" class="tab-view active-view">
                <div id="list-calender" class="task-list"></div>
            </section>

            <section id="view-todos" class="tab-view">
                <div id="list-todos" class="task-list"></div>
            </section>

            <section id="view-chores" class="tab-view">
                <div id="list-chores" class="task-list"></div>
            </section>

            <section id="view-habits" class="tab-view">
                <div id="list-habits" class="task-list"></div>
            </section>

            <section id="view-rewards" class="tab-view">
                <div class="reward-section">
                    <input type="text" id="reward-name" placeholder="Reward Name" onkeydown="if(event.key === 'Enter') saveReward()">
                    <input type="number" style="max-width: 62px;" id="reward-cost" placeholder="Cost" onkeydown="if(event.key === 'Enter') saveReward()">
                    <button class="btn-primary" id="btn-add-reward" onclick="saveReward()">+</button>
                    <button class="btn-cancel" id="btn-cancel-reward" onclick="cancelEditReward()" style="display:none;">Cancel</button>
                </div>
                <div id="list-rewards" class="task-list" style="margin-top: 1rem;"></div>
                <hr style="border: 1px solid #333; margin: 2rem 0;">
                <div class="maintenance-actions">
                    <button class="btn-backup" onclick="exportData()">💾 Backup Data</button>
                    <label class="btn-restore">
                        📂 Restore Data
                        <input type="file" id="importFile" onchange="importData(event)" style="display: none;">
                    </label>
                </div>
                <div id="quote-mobile" class="quote-display"></div>
            </section>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Add New Item</h3>

            <select id="task-category" onchange="toggleCategoryFields()">
                <option value="todos">To-Do (One-time/Bonus)</option>
                <option value="chores">Chore (Repeating)</option>
                <option value="habits">Habit (Repeatable, no due date)</option>
            </select>

            <input type="text" id="task-title" placeholder="Task Title" onkeydown="if(event.key === 'Enter') saveTask()" required>

            <div id="folder-group">
                <input type="text" id="task-folder" placeholder="Folder/Header (e.g., Work, Home)">
            </div>
            
            <!-- Difficulty Dropdown -->
            <select id="task-difficulty">
                <option value="trivial">Trivial (2 pts)</option>
                <option value="easy">Easy (5 pts)</option>
                <option value="medium">Medium (10 pts)</option>
                <option value="hard">Hard (20 pts)</option>
                <option value="expert">Expert (30 pts)</option>
            </select>

            <!-- Subtasks Manager (Only shows for Chores) -->
            <div id="subtasks-group" style="display:none; background: var(--bg-dark); padding: 10px; border-radius: 6px; border: 1px solid #333;">
                <label style="font-size: 0.85rem; color: var(--text-muted);">Divided Subtasks:</label>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="text" id="new-subtask-title" placeholder="Add a subtask..." onkeydown="if(event.key === 'Enter') addModalSubtask(event)">
                    <button class="btn-primary" onclick="addModalSubtask(event)">+</button>
                </div>
                <ul id="modal-subtask-list" style="list-style:none; padding:0; margin-top:10px; display:flex; flex-direction:column; gap:5px;"></ul>
            </div>

            <div id="date-group">
                <label>Due Date:</label>
                <input type="date" id="task-date">
            </div>

            <!-- Chore Specific: Recurring Options -->
            <div id="chore-group" style="display:none;">
                <label>Repeats:</label>
                <select id="task-recur-type" onchange="toggleCategoryFields()">
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="interval">Custom Interval (Days)</option>
                </select>
                <input type="number" id="task-recur-days" placeholder="Every X days" style="display:none; margin-top: 0.5rem;">
            </div>
            <div id="habit-group" style="display:none;">
                <label>Counter Resets:</label>
                <select id="task-habit-reset">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="never">Never</option>
                </select>
            </div>
            <textarea id="task-notes" placeholder="Notes..."></textarea>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveTask()">✔</button>
            </div>
        </div>
    </div>

    <!-- NEW: Randomizer Modal -->
    <div id="random-modal" class="modal">
        <div class="modal-content" style="text-align: center; padding: 3rem;">
            <h3 id="random-folder-name" style="color: var(--text-muted); margin-bottom: 1rem;">Choosing from...</h3>
            
            <div id="random-animation-box" style="font-size: 1.5rem; font-weight: bold; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--accent);">
                🎲 Shuffling...
            </div>
            
            <div class="modal-actions" style="justify-content: center; margin-top: 2rem;">
                <button class="btn-backup" id="btn-close-random" onclick="closeRandomModal()" style="display:none;">Let's Do It!</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
